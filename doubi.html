       <style>
       
       /*--------------------
Body
--------------------*/
*,
*::before,
*::after {
  box-sizing: border-box;
}

html, body {
	<embed src="misc/Can_Not_Take_My_Eyes_Off_You.mp3 " autostart="true" loop="true" hidden="true" ></embed>
  height: 100%;
  background: #fb527a;
}

/*--------------------
Mixins
--------------------*/
/*--------------------
Wrapper
--------------------*/
.wrapper {
  position: absolute;
  top: 50%;
  left: 50%;
  -webkit-transform: translate(-50%, -50%);
          transform: translate(-50%, -50%);
  width: 369px;
  height: 547px;
  font-family: 'Source Sans Pro', sans-serif;
  -webkit-transform-style: preserve-3d;
          transform-style: preserve-3d;
  -webkit-transform: translate(-50%, -50%) perspective(600px) rotateY(20deg) rotateX(10deg);
          transform: translate(-50%, -50%) perspective(600px) rotateY(20deg) rotateX(10deg);
}

/*--------------------
Me
--------------------*/
.me {
  position: relative;
  width: 369px;
  height: 547px;
  -webkit-transform: translateZ(80px) scale(0.8);
          transform: translateZ(80px) scale(0.8);
}
.me::before, .me::after {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  border-radius: 10px;
  background: url("image/profile.png") no-repeat 0 0;
}
.me::after {
  height: 30px;
  top: auto;
  bottom: -15px;
  z-index: -1;
  -webkit-filter: blur(15px);
          filter: blur(15px);
  background-size: 100% 30px;
  border-radius: 100px;
}
.me .eye, .me .eye::before {
  width: 70px;
  height: 70px;
  position: absolute;
  top: 175px;
  left: 120px;
  z-index: -1;
  background: url(http://www.supah.it/dribbble/006/eye.png) no-repeat center;
}
.me .eye::before {
  content: '';
  top: -2px;
  left: 97px;
}

.text {
  position: absolute;
  top: 0;
  left: 0;
  z-index: 2;
  width: 390px;
  height: 595px;
  -webkit-transform: translateZ(150px) translateX(-11px) translateY(-26px) scale(0.55);
          transform: translateZ(150px) translateX(-11px) translateY(-26px) scale(0.55);
  border: 3px solid white;
  text-align: center;
  font-size: 100px;
  line-height: 1000px;
  color: white;
  background: linear-gradient(135deg, white 0%, rgba(255, 255, 255, 0.36) 39%, rgba(255, 255, 255, 0.07) 41%, rgba(255, 255, 255, 0) 51%, black 100%);
  opacity: .3;
  border-radius: 8px;
}
.text::after {
  content: '我帅吗？';
  width: 100%;
  position: absolute;
  bottom: 22px;
  left: 0;
  width: 100%;
  z-index: 1;
  line-height: 1;
  font-size: 18px;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 20px;
  text-indent: 20px;
}
.social-icons li {
    display: inline;
    padding-right: 10px;
}
.social-icons li a i {
    font-size:20px;
    color: #000;
}
ul.social-icons.list-inline {
    text-align: center;
}
       
       
       </style>
       
       
       
       
       
       
       
   </head>
   <body>
<div class="wrapper">
  <div class="card">
    <div class="me">
      <div class="eye"></div>
    </div>
    <div class="text">
      SEE ME
	  	
    </div>
  </div>
</div>
      <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
      
      <script>
       
       var $wrap = $('.wrapper'),
  $lEye = $('.eye'),
  lFollowX = 5,
  lFollowY = 10,
  x = 0,
  y = 0,
  friction = 1 / 12;

function animate() {
  x += (lFollowX - x) * friction;
  y += (lFollowY - y) * friction;

  $lEye.css({
    '-webit-transform': 'translate(' + -x + 'px, ' + -y + 'px)',
    '-moz-transform': 'translate(' + -x + 'px, ' + -y + 'px)',
    'transform': 'translate(' + -x + 'px, ' + -y + 'px)'
  });

  $wrap.css({
    'transform': 'translate(-50%, -50%) perspective(600px) rotateY(' + -x + 'deg) rotateX(' + y + 'deg)'
  });
  window.requestAnimationFrame(animate);
}

$(window).on('mousemove click', function(e) {

  var lMouseX = Math.max(-100, Math.min(100, $(window).width() / 2 - e.clientX));
  var lMouseY = Math.max(-100, Math.min(100, $(window).height() / 2 - e.clientY));
  lFollowX = (12 * lMouseX) / 100; // 100 : 12 = lMouxeX : lFollow
  lFollowY = (10 * lMouseY) / 100;

});

animate();
       </script>
      
   
      
   </body>
